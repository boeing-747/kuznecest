<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F1EFE8">
<title>9:30 EST</title>
<meta name="description" content="Ежедневные разборы новостей, сетапов и сделок. Forex, XAUUSD.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #F1EFE8;
    color: #042C53;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    background:
      radial-gradient(circle at 20% 0%, rgba(133, 183, 235, 0.35), transparent 55%),
      radial-gradient(circle at 80% 100%, rgba(55, 138, 221, 0.25), transparent 55%),
      #F1EFE8;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 28px;
    padding: 36px 28px 32px;
    box-shadow:
      0 1px 0 rgba(4, 44, 83, 0.04),
      0 20px 50px -20px rgba(4, 44, 83, 0.25);
    text-align: center;
    border: 1px solid rgba(24, 95, 165, 0.08);
  }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 22px;
    display: block;
    border: 3px solid #85B7EB;
    box-shadow: 0 8px 24px -8px rgba(24, 95, 165, 0.4);
  }

  .title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #185FA5;
    -webkit-text-stroke: 1.2px #EF9F27;
    margin-bottom: 18px;
    line-height: 1.1;
  }

  .description {
    font-size: 15px;
    line-height: 1.55;
    color: #042C53;
    opacity: 0.85;
    margin-bottom: 14px;
    padding: 0 4px;
  }

  .profile {
    font-size: 13px;
    font-weight: 600;
    color: #378ADD;
    margin-bottom: 32px;
    letter-spacing: 0.3px;
  }

  .cta-label {
    font-size: 14px;
    color: #042C53;
    opacity: 0.7;
    margin-bottom: 14px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 22px;
    background: linear-gradient(135deg, #185FA5 0%, #378ADD 100%);
    color: #ffffff;
    text-decoration: none;
    font-size: 16px;
    font-weight: 700;
    border-radius: 16px;
    box-shadow: 0 10px 24px -10px rgba(24, 95, 165, 0.7);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .btn:active {
    transform: translateY(1px);
    box-shadow: 0 6px 16px -8px rgba(24, 95, 165, 0.7);
  }

  .btn svg {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  @media (max-width: 360px) {
    .card { padding: 30px 22px 26px; border-radius: 24px; }
    .title { font-size: 28px; }
    .avatar { width: 104px; height: 104px; }
  }
</style>
</head>
<body>
  <main class="card">
    <img class="avatar" src="https://i.ibb.co/Y408DTsZ/image.png" alt="Аватар канала">

    <h1 class="title">9:30 EST</h1>

    <p class="description">
      Ежедневные разборы новостей, сетапов и сделок. Разработка сканеров и ПО.
    </p>
    <p class="profile">Профиль: Forex, XAUUSD</p>

    <p class="cta-label">Присоединяйся к каналу</p>

    <a class="btn" href="tg://join?invite=rbrs7Iw7ZsRkYzgy">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M21.5 3.5L2.5 11.2c-.7.3-.7 1.3 0 1.5l4.8 1.5 1.9 5.9c.2.6 1 .8 1.4.3l2.7-2.9 4.9 3.6c.6.4 1.4.1 1.5-.6l3-15.4c.2-.8-.6-1.5-1.2-1.6z" fill="#85B7EB"/>
        <path d="M9.5 14.7l8.3-7.4c.2-.2.5.1.3.3l-6.8 7-.3 3.5c-.4-.4-1.5-3.4-1.5-3.4z" fill="#185FA5"/>
      </svg>
      Перейти в Telegram
    </a>
  </main>
</body>
</html>
